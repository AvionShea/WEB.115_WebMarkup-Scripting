<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M5 Assignment - Cobb</title>
  </head>
  <body>
    <h2>Simple Sentence Generator</h2>
    <input type="button" id="generateBtn" value="Generate Sentence" />
    <p id="output"></p>
    <script>
      /* Create an array */
      const words = [
        "Hello, ",
        "I ",
        "am ",
        "interested ",
        "in ",
        "embedded ",
        "software ",
        "or ",
        "firmware ",
        "engineering.",
      ];
      /* Create function that concatenates array into 
a sentence (adding spaces between words), and 
outputs the result to '<p id="output"><p>' innerHTML */
      function generateSentence() {
        let sentence = "";
        for (let i = 0; i < words.length; i++) {
          sentence += words[i];
        }
        document.getElementById("output").innerHTML = `<p>${sentence}</p>`;
      }
      /* Add an event listener to generateBtn.
When clicked, the generateBtn should execute 
the generateSentence function, displaying the sentence. */
      document
        .getElementById("generateBtn")
        .addEventListener("click", generateSentence);
    </script>
  </body>
</html>
